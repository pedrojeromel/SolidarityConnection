name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  REGISTRY: ghcr.io

jobs:
  version:
    name: Versão
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolver versão
        id: resolve
        run: |
          BASE=$(tr -d '[:space:]' < VERSION)

          # Tag git (v1.2.3) manda na versão; fora dela, VERSION + build number,
          # para que todo build da main gere uma versão única e rastreável.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${BASE}-build.${GITHUB_RUN_NUMBER}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Versão do build: ${VERSION}"

  build:
    name: Build (.NET)
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore SolidarityConnection.slnx

      - name: Build
        run: |
          dotnet build SolidarityConnection.slnx \
            -c Release \
            --no-restore \
            -p:Version=${{ needs.version.outputs.version }}

      - name: Test
        run: dotnet test SolidarityConnection.slnx -c Release --no-build

  docker:
    name: Docker (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [version, build]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api
            image: solidarity-api
            context: .
            dockerfile: Solidarity.Api/Dockerfile
          - service: worker
            image: solidarity-worker
            context: .
            dockerfile: Solidarity.Worker/Dockerfile
          - service: frontend
            image: solidarity-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.version=${{ needs.version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            APP_VERSION=${{ needs.version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
