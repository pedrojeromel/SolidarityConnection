name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Uma release por vez: dois pushes simultaneos na main nao podem disputar
# a mesma tag de versao.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: '10.0.x'
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1) Versão: calculada a partir dos Conventional Commits
  # ─────────────────────────────────────────────────────────────
  version:
    name: Versão
    runs-on: ubuntu-latest
    # O commit de release feito pelo proprio CI nao pode disparar outra release.
    if: "!startsWith(github.event.head_commit.message, 'chore(release)')"
    outputs:
      version: ${{ steps.semver.outputs.version }}
      previous: ${{ steps.semver.outputs.previous }}
      release: ${{ steps.semver.outputs.release }}
      bump: ${{ steps.semver.outputs.bump }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Historico completo: o calculo depende das tags e dos commits.
          fetch-depth: 0

      - name: Calcular versão (semver)
        id: semver
        run: |
          set -e

          LAST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)

          if [ -z "$LAST_TAG" ]; then
            # Primeira release: adota a versão do arquivo VERSION como base.
            VERSION=$(tr -d '[:space:]' < VERSION)
            PREVIOUS="-"
            BUMP="inicial"
          else
            PREVIOUS="${LAST_TAG#v}"

            MAJOR=$(echo "$PREVIOUS" | cut -d. -f1)
            MINOR=$(echo "$PREVIOUS" | cut -d. -f2)
            PATCH=$(echo "$PREVIOUS" | cut -d. -f3)

            SUBJECTS=$(git log "${LAST_TAG}..HEAD" --format='%s')
            BODIES=$(git log "${LAST_TAG}..HEAD" --format='%b')

            if [ -z "$SUBJECTS" ]; then
              echo "Nenhum commit novo desde ${LAST_TAG}. Nada a publicar."
              echo "release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            # Breaking change: "feat!:" / "fix!:" ou "BREAKING CHANGE" no corpo.
            if echo "$SUBJECTS" | grep -qE '^[a-z]+(\([^)]+\))?!:' \
              || echo "$BODIES" | grep -q 'BREAKING CHANGE'; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0; BUMP="major"
            elif echo "$SUBJECTS" | grep -qE '^feat(\([^)]+\))?:'; then
              MINOR=$((MINOR + 1)); PATCH=0; BUMP="minor"
            else
              # fix, perf, refactor, docs, chore e afins: correção.
              PATCH=$((PATCH + 1)); BUMP="patch"
            fi

            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::A tag v${VERSION} já existe. Abortando para não sobrescrever uma versão publicada."
            exit 1
          fi

          {
            echo "version=${VERSION}"
            echo "previous=${PREVIOUS}"
            echo "bump=${BUMP}"
            echo "release=true"
          } >> "$GITHUB_OUTPUT"

          echo "### Versão ${VERSION} (${BUMP})" >> "$GITHUB_STEP_SUMMARY"
          echo "Versão anterior: ${PREVIOUS}" >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────
  # 2) Build + testes
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build (.NET)
    runs-on: ubuntu-latest
    needs: version
    if: always() && needs.version.result != 'failure'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore SolidarityConnection.slnx

      - name: Build
        run: |
          dotnet build SolidarityConnection.slnx \
            -c Release \
            --no-restore \
            -p:Version=${{ needs.version.outputs.version || '0.0.0' }}

      - name: Test
        run: dotnet test SolidarityConnection.slnx -c Release --no-build

  # ─────────────────────────────────────────────────────────────
  # 3) Imagens Docker (tags imutáveis + histórico no GHCR)
  # ─────────────────────────────────────────────────────────────
  docker:
    name: Docker (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [version, build]
    if: needs.version.outputs.release == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api
            image: solidarity-api
            context: .
            dockerfile: Solidarity.Api/Dockerfile
          - service: worker
            image: solidarity-worker
            context: .
            dockerfile: Solidarity.Worker/Dockerfile
          - service: email-worker
            image: solidarity-email-worker
            context: .
            dockerfile: Solidarity.EmailWorker/Dockerfile
          - service: frontend
            image: solidarity-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          # X.Y.Z é imutável e nunca reaproveitada: é o histórico.
          # X.Y, X e latest são ponteiros móveis para a versão mais recente.
          tags: |
            type=semver,pattern={{version}},value=${{ needs.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.version.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.version.outputs.version }}
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
          labels: |
            org.opencontainers.image.version=${{ needs.version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            APP_VERSION=${{ needs.version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ─────────────────────────────────────────────────────────────
  # 4) Release: tag git, GitHub Release e sincronização do repo
  # ─────────────────────────────────────────────────────────────
  release:
    name: Release ${{ needs.version.outputs.version }}
    runs-on: ubuntu-latest
    needs: [version, build, docker]
    if: github.event_name == 'push' && needs.version.outputs.release == 'true'
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar identidade do git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Gerar notas da release
        id: notes
        env:
          VERSION: ${{ needs.version.outputs.version }}
          PREVIOUS: ${{ needs.version.outputs.previous }}
        run: |
          set -e

          if [ "$PREVIOUS" = "-" ]; then
            RANGE=""
          else
            RANGE="v${PREVIOUS}..HEAD"
          fi

          {
            echo "## [${VERSION}] — $(date +%Y-%m-%d)"
            echo

            for pair in "feat:Adicionado" "fix:Corrigido" "perf:Desempenho" "refactor:Alterado" "docs:Documentação"; do
              TYPE="${pair%%:*}"
              TITLE="${pair##*:}"

              # ${RANGE:+"$RANGE"} expande para nada quando RANGE e vazio
              # (primeira release: nao ha tag anterior para delimitar o intervalo).
              ENTRIES=$(git log ${RANGE:+"$RANGE"} --format='%s' \
                | grep -E "^${TYPE}(\([^)]+\))?!?:" \
                | sed -E "s/^${TYPE}(\([^)]+\))?!?:[[:space:]]*//" \
                | sed 's/^/- /' || true)

              if [ -n "$ENTRIES" ]; then
                echo "### ${TITLE}"
                echo
                echo "$ENTRIES"
                echo
              fi
            done

            echo "### Imagens publicadas"
            echo
            echo '```text'
            echo "ghcr.io/${{ github.repository_owner }}/solidarity-api:${VERSION}"
            echo "ghcr.io/${{ github.repository_owner }}/solidarity-worker:${VERSION}"
            echo "ghcr.io/${{ github.repository_owner }}/solidarity-frontend:${VERSION}"
            echo '```'
          } > NOTES.md

          cat NOTES.md

      - name: Atualizar CHANGELOG e arquivos de versão
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -e

          chmod +x scripts/set-version.sh
          ./scripts/set-version.sh "$VERSION"

          # Insere a nova seção logo após o cabeçalho do CHANGELOG.
          if [ -f CHANGELOG.md ]; then
            HEADER_END=$(grep -n '^---$' CHANGELOG.md | head -n1 | cut -d: -f1)

            head -n "$HEADER_END" CHANGELOG.md            >  CHANGELOG.new
            echo                                          >> CHANGELOG.new
            cat NOTES.md                          >> CHANGELOG.new
            echo '---'                                    >> CHANGELOG.new
            tail -n +$((HEADER_END + 1)) CHANGELOG.md     >> CHANGELOG.new

            mv CHANGELOG.new CHANGELOG.md
          fi

      - name: Commit, tag e push
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -e

          # .env fica de fora: e ignorado pelo git (arquivo local de cada maquina).
          git add VERSION CHANGELOG.md frontend/package.json k8s/kustomization.yaml

          # "chore(release)" é o guarda que impede este commit de disparar outra release.
          git commit -m "chore(release): ${VERSION} [skip ci]" || echo "Nada a commitar."

          git tag -a "v${VERSION}" -m "Release ${VERSION}"

          git push origin HEAD:main
          git push origin "v${VERSION}"

      - name: Criar GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file NOTES.md

      - name: Resumo
        env:
          VERSION: ${{ needs.version.outputs.version }}
          PREVIOUS: ${{ needs.version.outputs.previous }}
          BUMP: ${{ needs.version.outputs.bump }}
        run: |
          {
            echo "## Release ${VERSION} publicada"
            echo
            echo "| | |"
            echo "|---|---|"
            echo "| Versão anterior | ${PREVIOUS} |"
            echo "| Incremento | ${BUMP} |"
            echo "| Tag git | v${VERSION} |"
            echo
            echo "As versões anteriores continuam disponíveis no GHCR."
          } >> "$GITHUB_STEP_SUMMARY"
