services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: solidarity-sqlserver    
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Solidarity@123"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Solidarity@123", "-Q", "SELECT 1", "-C"]
      interval: 20s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  mongodb:
    image: mongo:8
    container_name: solidarity-mongodb
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 20s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management
    container_name: solidarity-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 20s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Solidarity.Api/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-1.0.0}
    # Tag imutavel por versao: e o que permite voltar para um build anterior.
    image: solidarity-api:${APP_VERSION:-1.0.0}
    container_name: solidarity-api
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      sqlserver:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Solidarity.Worker/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-1.0.0}
    image: solidarity-worker:${APP_VERSION:-1.0.0}
    container_name: solidarity-worker
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # O browser do usuario chama a API pelo host, nao pela rede do compose.
        VITE_API_URL: http://localhost:8080
        APP_VERSION: ${APP_VERSION:-1.0.0}
    image: solidarity-frontend:${APP_VERSION:-1.0.0}
    container_name: solidarity-frontend
    ports:
      - "3001:80"
    depends_on:
      - api
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Observabilidade — Prometheus + Grafana
  # ─────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: solidarity-prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: solidarity-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "Admin@123"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: solidarity-node-exporter
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    ports:
      - "9100:9100"
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: solidarity-cadvisor
    privileged: true
    volumes:
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8081:8080"
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Zabbix — Monitoramento de Infraestrutura
  # ─────────────────────────────────────────

  zabbix-db:
    image: postgres:16-alpine
    container_name: solidarity-zabbix-db
    environment:
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: "Zabbix@123"
      POSTGRES_DB: zabbix
    volumes:
      - zabbix-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-7.0-latest
    container_name: solidarity-zabbix-server
    environment:
      DB_SERVER_HOST: zabbix-db
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: "Zabbix@123"
      POSTGRES_DB: zabbix
    ports:
      - "10051:10051"
    depends_on:
      - zabbix-db
    restart: unless-stopped

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-7.0-latest
    container_name: solidarity-zabbix-web
    environment:
      DB_SERVER_HOST: zabbix-db
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: "Zabbix@123"
      POSTGRES_DB: zabbix
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: America/Sao_Paulo
    ports:
      - "8082:8080"
    depends_on:
      - zabbix-server
    restart: unless-stopped

  zabbix-agent:
    image: zabbix/zabbix-agent2:alpine-7.0-latest
    container_name: solidarity-zabbix-agent
    environment:
      ZBX_HOSTNAME: solidarity-docker-host
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: "10051"
      ZBX_ENABLEREMOTECOMMANDS: "1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - zabbix-server
    restart: unless-stopped

  zabbix-init:
    image: alpine:3.19
    container_name: solidarity-zabbix-init
    entrypoint: ["/bin/sh", "/init/zabbix-init.sh"]
    volumes:
      - ./observability/zabbix/zabbix-init.sh:/init/zabbix-init.sh:ro
    depends_on:
      - zabbix-web
      - zabbix-agent
    restart: "no"

volumes:
  prometheus-data:
  grafana-data:
  zabbix-db-data: