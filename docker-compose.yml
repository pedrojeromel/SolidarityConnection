services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: solidarity-sqlserver    
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Solidarity@123"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Solidarity@123", "-Q", "SELECT 1", "-C"]
      interval: 20s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  mongodb:
    image: mongo:8
    container_name: solidarity-mongodb
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 20s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management
    container_name: solidarity-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 20s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # As imagens da aplicacao vem PRONTAS do GitHub Container Registry, geradas
  # pelo pipeline de CI. Ninguem precisa compilar nada: todos rodam exatamente
  # o mesmo artefato publicado.
  #
  # APP_VERSION fixa uma versao (ex.: 1.2.0) e permite rollback.
  # Sem ele, usa "latest" (a versao mais recente publicada).
  #
  # Para compilar a partir do codigo-fonte (desenvolvimento), use a sobreposicao:
  #   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build

  api:
    image: ghcr.io/pedrojeromel/solidarity-api:${APP_VERSION:-latest}
    container_name: solidarity-api
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      sqlserver:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: ghcr.io/pedrojeromel/solidarity-worker:${APP_VERSION:-latest}
    container_name: solidarity-worker
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # Worker dedicado exclusivamente ao envio de e-mail (como uma function).
  # Consome as filas de e-mail e dispara via SMTP. Localmente envia para o
  # Mailpit; em producao, as credenciais vem de variaveis de ambiente.
  email-worker:
    image: ghcr.io/pedrojeromel/solidarity-email-worker:${APP_VERSION:-latest}
    container_name: solidarity-email-worker
    environment:
      RabbitMq__Host: rabbitmq
      Smtp__Host: ${SMTP_HOST:-mailpit}
      Smtp__Port: ${SMTP_PORT:-1025}
      Smtp__UseSsl: ${SMTP_USESSL:-false}
      Smtp__Username: ${SMTP_USERNAME:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__FromName: ${SMTP_FROMNAME:-Conexão Solidária}
      Smtp__FromEmail: ${SMTP_FROMEMAIL:-nao-responda@conexaosolidaria.org}
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # Servidor SMTP de teste: captura os e-mails e mostra na interface web.
  # Nao entrega para caixas reais — ideal para desenvolvimento e demonstracao.
  mailpit:
    image: axllent/mailpit:latest
    container_name: solidarity-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # interface web
    restart: unless-stopped

  frontend:
    image: ghcr.io/pedrojeromel/solidarity-frontend:${APP_VERSION:-latest}
    container_name: solidarity-frontend
    ports:
      - "3001:80"
    depends_on:
      - api
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Observabilidade — Prometheus + Grafana
  # ─────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: solidarity-prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: solidarity-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "Admin@123"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: solidarity-node-exporter
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    ports:
      - "9100:9100"
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: solidarity-cadvisor
    privileged: true
    volumes:
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8081:8080"
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Zabbix — Monitoramento de Infraestrutura
  # ─────────────────────────────────────────

  zabbix-db:
    image: postgres:16-alpine
    container_name: solidarity-zabbix-db
    environment:
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: "Zabbix@123"
      POSTGRES_DB: zabbix
    volumes:
      - zabbix-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-7.0-latest
    container_name: solidarity-zabbix-server
    environment:
      DB_SERVER_HOST: zabbix-db
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: "Zabbix@123"
      POSTGRES_DB: zabbix
    ports:
      - "10051:10051"
    depends_on:
      - zabbix-db
    restart: unless-stopped

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-7.0-latest
    container_name: solidarity-zabbix-web
    environment:
      DB_SERVER_HOST: zabbix-db
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: "Zabbix@123"
      POSTGRES_DB: zabbix
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: America/Sao_Paulo
    ports:
      - "8082:8080"
    depends_on:
      - zabbix-server
    restart: unless-stopped

  zabbix-agent:
    image: zabbix/zabbix-agent2:alpine-7.0-latest
    container_name: solidarity-zabbix-agent
    environment:
      ZBX_HOSTNAME: solidarity-docker-host
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: "10051"
      ZBX_ENABLEREMOTECOMMANDS: "1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - zabbix-server
    restart: unless-stopped

  zabbix-init:
    image: alpine:3.19
    container_name: solidarity-zabbix-init
    entrypoint: ["/bin/sh", "/init/zabbix-init.sh"]
    volumes:
      - ./observability/zabbix/zabbix-init.sh:/init/zabbix-init.sh:ro
    depends_on:
      - zabbix-web
      - zabbix-agent
    restart: "no"

volumes:
  prometheus-data:
  grafana-data:
  zabbix-db-data: