server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota do React Router cai no index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'healthy';
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
