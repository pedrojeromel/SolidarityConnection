server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Assets com hash no nome (index-a1b2c3.js): o conteudo nunca muda para o
    # mesmo nome, entao podem ser cacheados para sempre.
    # Se o arquivo nao existir, retorna 404 — sem cair no fallback do SPA, que
    # devolveria HTML no lugar de JS e quebraria a pagina de forma silenciosa.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # O index.html NAO pode ser cacheado: ele aponta para o bundle da versao
    # atual. Se o browser servir um index antigo, o usuario continua rodando a
    # versao anterior mesmo apos um deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA: qualquer rota do React Router cai no index.html.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'healthy';
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
