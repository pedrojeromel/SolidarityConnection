apiVersion: apps/v1
kind: Deployment
metadata:
  name: solidarity-payment-service
  namespace: solidarity
  labels:
    app: solidarity-payment-service
    app.kubernetes.io/version: "1.0.0"
  annotations:
    kubernetes.io/change-cause: "Deploy versao 1.0.0"
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: solidarity-payment-service
  template:
    metadata:
      labels:
        app: solidarity-payment-service
        app.kubernetes.io/version: "1.0.0"
    spec:
      initContainers:
        - name: wait-for-sqlserver
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z sqlserver 1433; do echo waiting for sqlserver; sleep 2; done
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done
      containers:
        - name: solidarity-payment-service
          image: solidarity-payment-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_VERSION
              value: "1.0.0"
            # As configuracoes (SQL, Mongo, RabbitMQ, JWT) ja vem no
            # appsettings.json da imagem, apontando para os services do cluster.
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: solidarity-payment-service
  namespace: solidarity
spec:
  selector:
    app: solidarity-payment-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
