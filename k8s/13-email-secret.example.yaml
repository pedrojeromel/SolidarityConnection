# Template do Secret com as credenciais do SMTP real (produção).
#
# NÃO comite este arquivo com valores reais. Copie-o, preencha e aplique
# separadamente — ele NÃO está no kustomization.yaml de propósito:
#
#   cp k8s/13-email-secret.example.yaml /tmp/smtp-secret.yaml
#   # edite /tmp/smtp-secret.yaml com os valores reais (dos Secrets do GitHub)
#   kubectl apply -f /tmp/smtp-secret.yaml
#
# Depois, descomente o bloco "envFrom: secretRef" em k8s/13-email.yaml.
#
# As chaves do Secret usam o formato de variável de ambiente do .NET
# (Smtp__Username = seção "Smtp", chave "Username").
apiVersion: v1
kind: Secret
metadata:
  name: solidarity-smtp
  namespace: solidarity
type: Opaque
stringData:
  Smtp__Host: "smtp.seu-provedor.com"
  Smtp__Port: "587"
  Smtp__UseSsl: "true"
  Smtp__Username: "PREENCHER"
  Smtp__Password: "PREENCHER"
  Smtp__FromName: "Conexão Solidária"
  Smtp__FromEmail: "nao-responda@seu-dominio.org"
