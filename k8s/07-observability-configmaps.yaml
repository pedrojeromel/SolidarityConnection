apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: solidarity
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "solidarity-api"
        metrics_path: /metrics
        static_configs:
          - targets: ["solidarity-api:8080"]

      - job_name: "prometheus"
        static_configs:
          - targets: ["prometheus:9090"]

      - job_name: "cadvisor"
        static_configs:
          - targets: ["cadvisor:8080"]

      - job_name: "node-exporter"
        static_configs:
          - targets: ["node-exporter:9100"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: solidarity
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: solidarity
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-solidarity
  namespace: solidarity
data:
  solidarity-k8s.json: |
    {
      "__inputs": [],
      "__requires": [],
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 10,
          "title": "API - Requisicoes HTTP",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(increase(http_requests_received_total{job=\"solidarity-api\"}[1m])) by (code)",
              "legendFormat": "HTTP {{code}}",
              "refId": "A"
            }
          ],
          "title": "Requisicoes por Status Code (ultimo 1 min)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "id": 2,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=\"solidarity-api\"}[1m])) by (le))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"solidarity-api\"}[1m])) by (le))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"solidarity-api\"}[1m])) by (le))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ],
          "title": "Latencia de Requisicoes (p50 / p95 / p99)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 9 },
          "id": 11,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(http_requests_received_total{job=\"solidarity-api\"})",
              "legendFormat": "Total",
              "refId": "A"
            }
          ],
          "title": "Total de Requisicoes (acumulado)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 9 },
          "id": 12,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(http_requests_received_total{job=\"solidarity-api\", code=~\"4..|5..\"})",
              "legendFormat": "Erros",
              "refId": "A"
            }
          ],
          "title": "Total de Erros HTTP (4xx/5xx)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "mappings": [
                { "options": { "0": { "text": "DOWN" }, "1": { "text": "UP" } }, "type": "value" }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 9 },
          "id": 13,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "up{job=\"solidarity-api\"}",
              "legendFormat": "API",
              "refId": "A"
            }
          ],
          "title": "Status da API",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 13 },
          "id": 20,
          "title": "Infraestrutura - Pods (cAdvisor)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "percent",
              "min": 0,
              "max": 100
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "id": 3,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(container_cpu_usage_seconds_total{job=\"cadvisor\", container_label_io_kubernetes_pod_namespace=\"solidarity\", container_label_io_kubernetes_pod_name!=\"\", id=~\".*cri-containerd.*\"}[1m])) by (container_label_io_kubernetes_pod_name) * 100",
              "legendFormat": "{{container_label_io_kubernetes_pod_name}}",
              "refId": "A"
            }
          ],
          "title": "CPU por Pod (%)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "id": 4,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(container_memory_usage_bytes{job=\"cadvisor\", container_label_io_kubernetes_pod_namespace=\"solidarity\", container_label_io_kubernetes_pod_name!=\"\", id=~\".*cri-containerd.*\"}) by (container_label_io_kubernetes_pod_name)",
              "legendFormat": "{{container_label_io_kubernetes_pod_name}}",
              "refId": "A"
            }
          ],
          "title": "Memoria por Pod",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 22 },
          "id": 5,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(container_network_receive_bytes_total{job=\"cadvisor\", container_label_io_kubernetes_pod_namespace=\"solidarity\", container_label_io_kubernetes_pod_name!=\"\", id=~\".*cri-containerd.*\"}[1m])) by (container_label_io_kubernetes_pod_name)",
              "legendFormat": "{{container_label_io_kubernetes_pod_name}} RX",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(container_network_transmit_bytes_total{job=\"cadvisor\", container_label_io_kubernetes_pod_namespace=\"solidarity\", container_label_io_kubernetes_pod_name!=\"\", id=~\".*cri-containerd.*\"}[1m])) by (container_label_io_kubernetes_pod_name)",
              "legendFormat": "{{container_label_io_kubernetes_pod_name}} TX",
              "refId": "B"
            }
          ],
          "title": "Trafego de Rede por Pod (bytes/s)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 30 },
          "id": 30,
          "title": "Host - Node Exporter",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "percent",
              "min": 0,
              "max": 100
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 31 },
          "id": 6,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "100 - (avg(rate(node_cpu_seconds_total{job=\"node-exporter\", mode=\"idle\"}[1m])) * 100)",
              "legendFormat": "CPU Usage %",
              "refId": "A"
            }
          ],
          "title": "CPU do Host (%)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 31 },
          "id": 7,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "node_memory_MemTotal_bytes{job=\"node-exporter\"} - node_memory_MemAvailable_bytes{job=\"node-exporter\"}",
              "legendFormat": "Memoria Usada",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "node_memory_MemAvailable_bytes{job=\"node-exporter\"}",
              "legendFormat": "Memoria Disponivel",
              "refId": "B"
            }
          ],
          "title": "Memoria do Host",
          "type": "timeseries"
        }
      ],
      "refresh": "15s",
      "schemaVersion": 38,
      "tags": ["solidarity", "kubernetes", "api", "infra"],
      "templating": { "list": [] },
      "time": { "from": "now-30m", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "SolidarityConnection - Observabilidade (Kubernetes)",
      "uid": "solidarity-k8s",
      "version": 3
    }
